<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeArena — Problem</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/codemirror.min.css"/>
  <link rel="stylesheet" href="css/dracula.min.css"/>
  <style>
    /* Two column layout — problem on left, editor on right */
    .problem-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      height: calc(100vh - 60px - 2rem);
      padding: 1rem 2rem;
    }

    /* Left panel — problem description */
    .problem-panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .problem-panel h1 {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .problem-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .problem-description {
      color: var(--text-primary);
      line-height: 1.8;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .test-cases {
      margin-top: 1.5rem;
    }

    .test-cases h3 {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .test-case {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    .test-case-label {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
    }

    .test-case-value {
      color: var(--accent);
    }

    /* Right panel — code editor + submit */
    .editor-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .editor-toolbar {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px 10px 0 0;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-toolbar select {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* CodeMirror editor wrapper */
    .editor-wrapper {
      flex: 1;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
      height: 500px;
    }

    /* Make CodeMirror fill the full height */
    .CodeMirror {
      height: 100% !important;
      font-family: var(--font-mono) !important;
      font-size: 0.9rem !important;
    }

    .submit-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* Verdict box — hidden until a submission is made */
    .verdict-box {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      display: none;
    }

    .verdict-box.show {
      display: block;
    }

    /* Color the verdict box border + text based on result */
    .verdict-success { color: var(--success); border-color: var(--success); }
    .verdict-error   { color: var(--error);   border-color: var(--error); }
    .verdict-warning { color: var(--warning); border-color: var(--warning); }

    .btn-loading {
      opacity: 0.7;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/problems.html" class="navbar-brand">CodeArena</a>
    <ul class="navbar-links">
      <li><a href="/problems.html">Problems</a></li>
      <li><a href="/leaderboard.html">Leaderboard</a></li>
    </ul>
    <div class="navbar-user">
      logged in as <span id="nav-username"></span>
      <button class="btn btn-ghost" onclick="logout()" style="padding: 0.3rem 0.8rem; font-size: 0.8rem;">
        Logout
      </button>
    </div>
  </nav>

  <!-- Two column layout -->
  <div class="problem-layout">

    <!-- LEFT: Problem description -->
    <div class="problem-panel">
      <div id="problem-loading" style="color: var(--text-muted); font-family: var(--font-mono);">
        loading problem...
      </div>

      <div id="problem-content" style="display: none;">
        <h1 id="problem-title"></h1>
        <div class="problem-meta">
          <span class="badge" id="problem-difficulty"></span>
        </div>
        <div class="problem-description" id="problem-description"></div>

        <!-- Show first 2 test cases as examples -->
        <div class="test-cases">
          <h3>Examples</h3>
          <div id="test-cases-container"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Code editor -->
    <div class="editor-panel">
      <div>
        <div class="editor-toolbar">
          <span style="font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-muted);">
            solution.cpp
          </span>
          <!-- Language selector — only C++ for now -->
          <select id="language-select">
            <option value="cpp">C++</option>
          </select>
        </div>

        <!-- CodeMirror attaches itself to this textarea -->
        <div class="editor-wrapper">
          <textarea id="code-editor"></textarea>
        </div>
      </div>

      <!-- Submit button + verdict display -->
      <div class="submit-area">
        <button class="btn btn-primary" id="submit-btn" onclick="submitCode()">
          Submit →
        </button>
        <div class="verdict-box" id="verdict-box"></div>
      </div>
    </div>

  </div>

  <!-- CodeMirror loaded from local files (downloaded earlier) -->
  <script src="js/codemirror.min.js"></script>
  <!-- C++ syntax highlighting mode -->
  <script src="js/clike.min.js"></script>

  <script>
    // ── Auth check ──
    // If no token in localStorage, user isn't logged in — send them to login page
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/index.html';

    // Show the logged in username in the navbar
    document.getElementById('nav-username').textContent =
      localStorage.getItem('username') || '';

    // ── Get problem ID from URL ──
    // When a problem row is clicked, the URL becomes /problem.html?id=abc123
    // URLSearchParams reads the ?id=abc123 part
    const params = new URLSearchParams(window.location.search);
    const problemId = params.get('id'); // extracts "abc123"

    // If no ID in URL, go back to problems list
    if (!problemId) {
      window.location.href = '/problems.html';
    }

    // ── Set up CodeMirror editor ──
    const editor = CodeMirror.fromTextArea(
      document.getElementById('code-editor'),
      {
        mode: 'text/x-c++src',   // C++ syntax highlighting
        theme: 'dracula',         // dark theme
        lineNumbers: true,        // show line numbers
        indentUnit: 4,            // 4 spaces per indent
        tabSize: 4,
        indentWithTabs: false,    // spaces not tabs
        autoCloseBrackets: true,  // auto close { } ( ) [ ]
        lineWrapping: false,
      }
    );

    // Default C++ starter code so the editor isn't empty
    editor.setValue(`#include<iostream>
using namespace std;

int main() {
    // write your solution here

    return 0;
}`);

    // ── Load the problem from the backend ──
    async function loadProblem() {
      try {
        // Fetch this specific problem by its ID
        const response = await fetch(`/problems/${problemId}`);
        const problem = await response.json();

        if (!response.ok) {
          document.getElementById('problem-loading').textContent = 'Problem not found.';
          return;
        }

        // Hide loading text, show actual content
        document.getElementById('problem-loading').style.display = 'none';
        document.getElementById('problem-content').style.display = 'block';

        // Fill in the problem details
        document.getElementById('problem-title').textContent = problem.title;
        document.getElementById('problem-description').textContent = problem.description;

        // Set difficulty badge with correct color class
        const badge = document.getElementById('problem-difficulty');
        badge.textContent = problem.difficulty;
        badge.className = `badge badge-${problem.difficulty.toLowerCase()}`;

        // Show first 2 test cases as examples
        // We don't show ALL — that would give away hidden test cases
        const container = document.getElementById('test-cases-container');
        problem.testCases.slice(0, 2).forEach((tc, i) => {
          container.innerHTML += `
            <div class="test-case">
              <div class="test-case-label">Input ${i + 1}</div>
              <div class="test-case-value">${tc.input}</div>
              <div class="test-case-label" style="margin-top: 0.5rem;">Expected Output</div>
              <div class="test-case-value">${tc.expectedOutput}</div>
            </div>
          `;
        });

      } catch (error) {
        document.getElementById('problem-loading').textContent = 'Failed to load problem.';
      }
    }

    // ── Submit code ──
    async function submitCode() {
      // Get whatever code is currently in the editor
      const code = editor.getValue();

      if (!code.trim()) {
        return showVerdict('Please write some code first', 'error');
      }

      // Disable the button while judging — prevents double submissions
      const btn = document.getElementById('submit-btn');
      btn.textContent = 'Judging...';
      btn.classList.add('btn-loading');
      btn.disabled = true;

      try {
        // Send code + problemId to our backend judge
        // Authorization header carries the JWT token — required by authMiddleware
        const response = await fetch('/submit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ code, problemId })
        });

        const result = await response.json();

        // Display the verdict based on what the server returned
        if (result.verdict === 'Accepted') {
          showVerdict('✅ Accepted — All test cases passed!', 'success');
        } else if (result.verdict === 'Wrong Answer') {
          showVerdict(`❌ Wrong Answer — failed on input: ${result.failedOn}`, 'error');
        } else if (result.verdict === 'Time Limit Exceeded') {
          showVerdict('⏱ Time Limit Exceeded — check for infinite loops', 'warning');
        } else if (result.verdict === 'Compilation Error') {
          showVerdict('🔧 Compilation Error — check your syntax', 'error');
        } else {
          showVerdict('Runtime Error', 'error');
        }

      } catch (error) {
        showVerdict('Failed to submit. Is the server running?', 'error');
      } finally {
        // Re-enable the button no matter what happened
        btn.textContent = 'Submit →';
        btn.classList.remove('btn-loading');
        btn.disabled = false;
      }
    }

    // ── Show verdict in the verdict box ──
    function showVerdict(message, type) {
      const box = document.getElementById('verdict-box');
      box.textContent = message;
      // verdict-success / verdict-error / verdict-warning maps to CSS variables
      box.className = `verdict-box show verdict-${type}`;
    }

    // ── Logout ──
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/index.html';
    }

    // Load the problem when page opens
    loadProblem();
  </script>

</body>
</html>
